[pytest]
# Stand-alone config for the retrieval-quality eval. Lets the eval be run
# from `pytest eval/retrieval` regardless of working directory; the api
# pyproject.toml only governs `app/tests/`.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
addopts = -q --tb=short -p no:cacheprovider
markers =
    eval: retrieval-quality harness; needs GOOGLE_API_KEY + Postgres + Chroma
