# KnowledgeOps AI — full local stack.
# `docker compose up` brings every service to a healthy state.

x-api-env: &api_env
  APP_ENV: ${APP_ENV:-development}
  SECRET_KEY: ${SECRET_KEY}
  UPLOAD_ROOT: /srv/uploads
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://kops:kops@db:5432/kops}
  REDIS_URL: ${REDIS_URL:-redis://cache:6379/0}
  CHROMA_URL: ${CHROMA_URL:-http://vector:8000}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:7000}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_TTL_MIN: ${ACCESS_TOKEN_TTL_MIN:-60}
  COOKIE_SECURE: ${COOKIE_SECURE:-false}
  COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-004}
  EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
  MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
  RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-60}
  QUERY_RATE_LIMIT_PER_MIN: ${QUERY_RATE_LIMIT_PER_MIN:-20}
  LOGIN_RATE_LIMIT_PER_15MIN: ${LOGIN_RATE_LIMIT_PER_15MIN:-5}
  INSIGHT_COORDINATOR_CRON: ${INSIGHT_COORDINATOR_CRON:-*/30 * * * *}
  INSIGHT_NIGHTLY_AUDIT_CRON: ${INSIGHT_NIGHTLY_AUDIT_CRON:-0 3 * * *}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kops
      POSTGRES_PASSWORD: kops
      POSTGRES_DB: kops
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kops -d kops"]
      interval: 5s
      timeout: 3s
      retries: 20

  cache:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  vector:
    image: chromadb/chroma:0.5.23
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chromadata:/chroma/chroma
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      <<: *api_env
    volumes:
      - ./services/api:/srv/api
      - uploads_data:/srv/uploads
    ports:
      - "8090:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      vector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      <<: *api_env
    volumes:
      - ./services/api:/srv/api
      - ./services/worker:/srv/worker
      - uploads_data:/srv/uploads
    command: ["celery", "-A", "worker.celery_app:celery_app", "worker", "-l", "INFO", "--concurrency=2"]
    depends_on:
      api:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      <<: *api_env
    volumes:
      - ./services/api:/srv/api
      - ./services/worker:/srv/worker
      - uploads_data:/srv/uploads
    command: ["celery", "-A", "worker.celery_app:celery_app", "beat", "-l", "INFO"]
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: dev
    environment:
      # Inside the web container, the rewrite target must use container DNS,
      # not the host port. Hard-coded so it does not get overridden by .env.
      NEXT_PUBLIC_API_URL: http://api:8000
    volumes:
      - ./apps/web:/srv/apps/web
      - web_node_modules:/srv/apps/web/node_modules
    ports:
      - "7000:7000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  chromadata:
  web_node_modules:
  uploads_data:
